<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: rgb(233, 215, 159);
      }
      .box1 {
        border: 10px solid red;
      }
      .box2 {
        border: 10px dashed red;
      }
      .box3 {
        border: 10px groove red;
      }
      .box4 {
        border: 10px groove red;
        border-bottom: none;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <br />
    <div class="box2"></div>
    <br />
    <div class="box3"></div>
    <br />
    <div class="box4"></div>
  </body>
</html>
