<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        *{
            font-family: arial;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        div{
            margin-top: 15px;
        }
        .box1{
            width: calc(100% - 100px);
            height: 50px;
            background-color: tomato;
            margin: 0 auto;
        }

        .box2{
            width: min(50%,400px);
            height: 100px;
            background-color: darkgreen;
        }
        
        .box3{
            width: max(50%,600px);
            height: 100px;
            background-color: darkgreen;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
