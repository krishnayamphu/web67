<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css</title>
    <style type="text/css">
        *{
            margin: 0;
            padding: 0;
            font-family: arial;
            color:#222;
        }
        .dropdown{
            border: 1px solid #ccc;
            padding: 5px 15px;
            position: relative;
            display: inline-block;
            border-radius: 2px;

        }
        .dropdown-list{
            position: absolute;
            outline: 1px solid #ccc;
            width: auto;
            left: 1px;
            top: 29.5px;
            border-radius: 2px;
            display: none;
        }
        .dropdown-list a{
            display: block;
            text-decoration: none;
            padding: 5px 15px;
        }
        .dropdown-list a:hover{
            background-color: #f4f4f4;
        }
        .dropdown:hover .dropdown-list{
            display: block;
        }
    </style>
</head>
<body>

<div class="dropdown">
    <span>Dropdown</span>
    <div class="dropdown-list">
        <a href="">List One</a>
        <a href="">List Two</a>
        <a href="">List Three</a>
    </div>
</div>

</body>
</html>
