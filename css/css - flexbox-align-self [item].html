<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flexbox</title>
    <style type="text/css">
        .container{
            display: flex;
            border: 1px solid red;
            height: 100px;
            width: 200px;
            margin: 15px;
            float: left;
            align-items: center;
        }
        .item{ background-color:orange;}
        .item:nth-child(even){ background-color: green; }
        .flex-start{align-self: flex-start;}
        .flex-end{align-self: flex-end;}
        .flex-stretch{align-self: stretch;}
 
        
    </style>
</head>
<body>

<div class="container">
    <div class="item">Item 1</div>
    <div class="item flex-start">Item 2</div>
    <div class="item">Item 3</div>
</div>

<div class="container">
    <div class="item">Item 1</div>
    <div class="item flex-end">Item 2</div>
    <div class="item">Item 3</div>
</div>

<div class="container">
    <div class="item">Item 1</div>
    <div class="item flex-stretch">Item 2</div>
    <div class="item">Item 3</div>
</div>




</body>
</html>
