<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flexbox</title>
    <style type="text/css">
        .container{
            display: flex;
            border: 1px solid red;
            margin: 15px auto;
        }
        .item{ 
            background-color:orange;
        }
        .item:nth-child(even){ background-color: green; }
        
        .flex-basis-100{flex-basis: 100px;}
        .flex-basis-200{flex-basis: 200px;}
        .flex-basis-300{flex-basis: 300px;}
    
        
    </style>
</head>
<body>


<div class="container">
    <div class="item flex-basis-100">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
</div>
<div class="container">
    <div class="item flex-basis-200">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
</div>
<div class="container">
    <div class="item flex-basis-300">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
</div>

</body>
</html>
