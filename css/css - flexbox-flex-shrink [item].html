<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flexbox</title>
    <style type="text/css">
        .container{
            display: flex;
            border: 1px solid red;
            width: 400px;
            margin: 15px auto;
            flex-wrap: nowrap;
        }
        .item{ 
            background-color:orange;
            width: 200px;
        }
        .item:nth-child(even){ background-color: green; }
        
        .flex-shrink-1{flex-shrink: 1;}
        .flex-shrink-2{flex-shrink: 2;}
        .flex-shrink-3{flex-shrink: 3;}
    
        
    </style>
</head>
<body>


<div class="container">
    <div class="item flex-shrink-1">Item 1</div>
    <div class="item flex-shrink-2">Item 2</div>
    <div class="item flex-shrink-1">Item 3</div>
</div>
<div class="container">
    <div class="item flex-shrink-1">Item 1</div>
    <div class="item flex-shrink-3">Item 2</div>
    <div class="item flex-shrink-1">Item 3</div>
</div>


</body>
</html>
