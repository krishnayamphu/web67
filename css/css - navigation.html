<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nav</title>
    <style type="text/css">
        *{
            font-family: arial;
            margin: 0;
            padding: 0;
        }
        nav{
            background-color: tomato;
            width: 80%;
            margin: 30px auto;
        }
        nav ul{
            list-style: none;
        }
        nav ul li{
            display: inline-block;
        }
        nav ul li a{
            text-decoration: none;
            padding: 5px 15px;
            display: block;
            color:#222;
        }
        nav ul li a:hover{
            background-color: darkred;
            color:white;
        }
        nav ul li.active a{
            background-color: darkred;
            color:white;
        }

    </style>
</head>
<body>
<nav>
    <ul>
        <li class="active"><a href="#">Home</a></li><li><a href="#">Portfolio</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>
</body>
</html>
