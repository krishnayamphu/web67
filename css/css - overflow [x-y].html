<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css</title>
    <style type="text/css">
        div{
            width: 100px;
            height: 100px;
            border: 1px solid red;
            float: left;
            margin: 15px 50px;
        }
        .visible{overflow: visible;}
        .hidden{overflow: hidden;}
        .scroll{overflow: scroll;}
        .overflow-x{overflow-y: hidden;}
    </style>
</head>
<body>

   <div class="visible"><img src="bug.jpg"></div>
   <div class="hidden"><img src="bug.jpg"></div>
   <div class="scroll"><img src="bug.jpg"></div>
   <div class="overflow-x"><img src="bug.jpg"></div>

</body>
</html>
