<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css</title>
    <style type="text/css">
        div{
            width: 100px;
            height: 100px;
            position: absolute;
        }
        .box1{
            background-color: red;
            z-index: 3;
        }
        .box2{
            background-color: green;
            top:50px;
            left:50px;
            z-index: 2;
        }
        .box3{
            background-color: blue;
            top: 100px;
            left: 100px;
            z-index: 1;
        }
        .box2:hover{ z-index:999; }
        .box3:hover{ z-index:999; }
    </style>
</head>
<body>

    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>

</body>
</html>
