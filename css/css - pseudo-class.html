<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>html5</title>
    <style type="text/css">
      a:link{text-decoration: none;}
      a:visited{color:grey;}
      a:active{color:yellow;}
      a:hover{
        background: black;
        color: yellow;
        cursor: default;
    }
    </style>
</head>
<body>
    <a href="#1">Link 1</a>
    <a href="#2">Link 2</a>
    <a href="#3">Link 3</a>
    <a href="#4">Link 4</a>

</body>
</html>
