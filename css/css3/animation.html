<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css 3</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }
      @keyframes changeBg {
        from {
          background-color: red;
        }
        to {
          background-color: blue;
          border-radius: 50%;
          left: 80%;
        }
      }
      div {
        width: 100px;
        height: 100px;
        background-color: red;
        margin: 15px;
        animation-name: changeBg;
        animation-duration: 2s;
        animation-timing-function: ease;
        animation-delay: 0s;
        animation-direction: alternate;
        animation-iteration-count: infinite;
        position: relative;
        left: 0;
      }
      @keyframes changeTextColor {
        0% {
          color: black;
        }
        50% {
          color: red;
        }
        100% {
          color: blue;
          font-size: 20px;
        }
      }
      @keyframes changeSize {
        from {
          height: 100px;
          width: 100px;
        }
        to {
          height: 200px;
          width: 200px;
        }
      }
      p {
        animation: changeTextColor 3s alternate infinite;
      }

      img {
        height: 100px;
        width: 100px;
        object-fit: cover;
        margin: 15px;
        animation: changeSize 2s infinite;
      }
    </style>
  </head>
  <body>
    <div></div>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Laboriosam
      incidunt amet, inventore ratione quasi, quam sapiente voluptate debitis
      obcaecati voluptas dolore maxime eligendi nemo, quaerat facilis ea
      quibusdam reiciendis provident.
    </p>

    <img src="bg.PNG" alt="" />
  </body>
</html>
