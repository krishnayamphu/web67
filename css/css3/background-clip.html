<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css 3</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }
      div {
        width: 100px;
        height: 100px;
        background-color: rgb(53, 235, 147);
        float: left;
        margin: 15px;
        border: 10px dashed red;
        padding: 10px;
      }
      .box1 {
        background-clip: padding-box;
      }
      .box2 {
        background-clip: content-box;
      }
      .box3 {
        background-clip: border-box;
      }
    </style>
  </head>
  <body>
    <div>
      <p>Lorem, ipsum .</p>
    </div>
    <div class="box1">
      <p>Lorem, ipsum .</p>
    </div>
    <div class="box2">
      <p>Lorem, ipsum .</p>
    </div>
    <div class="box3">
      <p>Lorem, ipsum.</p>
    </div>
  </body>
</html>
