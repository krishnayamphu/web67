<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        div{
            width: 100px;
            height: 100px;
            border: 1px solid red;
            margin: 30px;
            float: left;
        }
        .box1{ box-shadow:5px 5px 2px #222; }
        .box2{ box-shadow:5px -5px 2px #222; }
        .box3{ 
            box-shadow:0px 0px 5px #222;
            border: none;
        }
        .box4{ 
            box-shadow:5px 5px 5px red,-5px -5px 5px blue;
            border: none;
        }
        .box5:hover{
            box-shadow: 0px 0px 5px 5px red;
            border: none;
        }
        .box6{ 
            box-shadow:inset 0px 0px 5px green;
            border: none;
             }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5">hover</div>
    <div class="box6">inset</div>

</body>
</html>
