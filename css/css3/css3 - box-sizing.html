<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        *{
            font-family: arial;
        }
        div{
            width: 100px;
            height: 100px;
            background-color: #ccc;
            float: left;
            margin: 15px;
        }
        .box1{
           padding: 10px;
        }
        .box2{
            padding: 10px;
            border:10px solid red;
        }
        .box3{
            padding: 10px;
            border:10px solid red;
            box-sizing: border-box;
        }
        
    </style>
</head>
<body>
    <div>box</div>
    <div class="box1">box1</div>
    <div class="box2">box2</div>
    <div class="box3">box3</div>
</body>
</html>
