<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        div{
            width: 100px;
            height: 100px;
            margin: 15px;
            float: left;
            border: 1px solid red;
        }
        .box1{ background-image:conic-gradient(gold, blue); }
        .box2{ background-image:conic-gradient(aquamarine,red,green, blue,yellow,aqua); }
        .box3{ background-image:conic-gradient(red 0deg, green 45deg,blue 90deg); }
        .box4{ background-image:conic-gradient(red 0deg, red 90deg, yellow 90deg, yellow 180deg, blue 180deg, blue 270deg, green 270deg); }
        .box5{ background-image:conic-gradient(from 90deg, red, green); }
        .box6{ background-image:conic-gradient(at 30% 40%,red, green,blue); }
        .box7{ background-image:repeating-conic-gradient(gold 0%, blue 10%); }
    </style>
</head>
<body>
<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
<div class="box4"></div>
<div class="box5"></div>
<div class="box6"></div>
<div class="box7"></div>
</body>
</html>
