<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        div{
            width: 150px;
            height: 100px;
            margin: 15px;
            float: left;
            border: 1px solid red;
        }
        .box1{ background-image:radial-gradient(red, blue); }
        .box2{ background-image:radial-gradient(circle,red, blue); }
        .box3{ background-image:radial-gradient(circle,red, green,blue); }
        .box4{ background-image:radial-gradient(circle,red, blue 46%, yellow 64%); }
        .box5{ background-image:radial-gradient(red,rgba(0,255,0,0.5)); }
        .box6{ background-image:repeating-radial-gradient(circle,gold, blue 10%); }
    </style>
</head>
<body>
<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>
<div class="box4"></div>
<div class="box5"></div>
<div class="box6"></div>
</body>
</html>
