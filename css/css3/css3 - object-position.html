<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        img{
            border: 1px solid red;
            width: 100px;
            height: 200px;
            object-fit: contain;
        }
       .img1{object-position:top;}
       .img2{object-position:center;}
       .img3{object-position:bottom;}
       .img4{
            width: 300px;
            height: 100px;
            object-position:left;
        }
        .img5{
            width: 300px;
            height: 100px;
            object-position:center;
        }
        .img6{
            width: 300px;
            height: 100px;
            object-position:right;
        }
        
    </style>
</head>
<body>
    <img class="img1" src="../bug.jpg">
    <img class="img2" src="../bug.jpg">
    <img class="img3" src="../bug.jpg">
    <img class="img4" src="../bug.jpg">
    <img class="img5" src="../bug.jpg">
    <img class="img6" src="../bug.jpg">
</body>
</html>
