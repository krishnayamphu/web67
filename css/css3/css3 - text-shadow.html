<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        *{
            font-family: arial;
        }
        .shadow1{ text-shadow:2px 2px 2px green; }
        .shadow2{ text-shadow:-2px -2px 2px red; }
        .shadow3{ 
            text-shadow:0px 0px 4px blue; 
            color:white; 
        }
        .shadow4{ 
            text-shadow:2px 2px 2px red,-2px -2px 2px blue; 
            color:white; 
        }
        .shadow5:hover{ 
            text-shadow:0px 0px 4px blue; 
            color:white; 
        }

    </style>
</head>
<body>
<h1 class="shadow1">Hello Wolrd</h1>
<h1 class="shadow2">Hello Wolrd</h1>
<h1 class="shadow3">Hello Wolrd</h1>
<h1 class="shadow4">Hello Wolrd</h1>
<h1 class="shadow5">Hello Wolrd</h1>
</body>
</html>
