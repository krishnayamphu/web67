<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        div{
            width: 100px;
            height: 100px;
            background-color: red;
            float: left;
            margin: 30px;
            transition: all 1s;
        }
        .box1:hover{transform: rotate(-360deg);}
        .box2:hover{transform: translate(0px,100px);}
        .box3:hover{transform: scale(2,2);}
        .box4:hover{transform: skew(-45deg, 0deg);}


    </style>
</head>
<body>
    <div class="box1">Box</div>
    <div class="box2">Box</div>
    <div class="box3">Box</div>
    <div class="box4">Box</div>
</body>
</html>
