<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        .container{
            width: 80%;
            height: auto;
            border: 1px solid red;
            margin: 15px auto;
            overflow: hidden;
            perspective: 200px;
        }
        .container div{
            width: 100px;
            height: 100px;
            background-color: red;
            float: left;
            margin: 15px;
             transition: all 1s;
        }
        .box1:hover{transform: rotateX(180deg);}
        .box2:hover{transform: rotateY(180deg);}
        .box3:hover{transform: rotateZ(360deg);}
        .box4:hover{transform: translateX(100px);}
        .box5:hover{transform: translateY(100px);}
        .box6:hover{transform: translateZ(-100px);}
        .box7:hover{transform: scaleX(2);}
        .box8:hover{transform: scaleY(2);}
        .box9:hover{transform: scaleZ(2);}


    </style>
</head>
<body>
    <div class="container">
        <div class="box1">Item</div>
        <div class="box2">Item</div>
        <div class="box3">Item</div>
    </div>

    <div class="container">
        <div class="box4">Item</div>
        <div class="box5">Item</div>
        <div class="box6">Item</div>
    </div>

    <div class="container">
        <div class="box7">Item</div>
        <div class="box8">Item</div>
        <div class="box9">Item</div>
    </div>
    
</body>
</html>
