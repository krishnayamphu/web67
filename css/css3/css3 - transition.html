<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>css3</title>
    <style type="text/css">
        *{
            font-family: arial;
        }
        .box1{
            width: 100px;
            height: 100px;
            background-color: red;
            margin: 30px;
            transition-property: all;
            transition-duration: 1s;
            transition-timing-function: ease;
            transition-delay: 0s;
        }
        .box1:hover{
            background-color: green;
            border-radius: 50%;
        }
    </style>
</head>
<body>
<div class="box1"></div>
</body>
</html>
