<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css 3</title>
    <style>
      div {
        margin: 15px auto;
        width: 800px;
        height: 300px;
        border: 5px solid green;
        background-size: cover;
      }
      h1 {
        text-align: center;
        line-height: 300px;
        text-transform: uppercase;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
      }
      .box1 {
        background-image: linear-gradient(
            rgba(255, 0, 0, 0.8),
            rgba(0, 0, 255, 0.5)
          ),
          url(bg.PNG);
      }
      .box2 {
        background-image: linear-gradient(
            rgba(255, 0, 0, 0.8),
            rgba(0, 0, 255, 0.8)
          ),
          url(bg.PNG);
      }

      .box3 {
        background-image: linear-gradient(
            rgba(0, 0, 0, 0.8),
            rgba(0, 0, 0, 0.8)
          ),
          url(bg.PNG);
      }
      @keyframes bg {
        from {
          background-image: linear-gradient(
              rgba(255, 0, 0, 0.742),
              rgba(0, 0, 255, 0.721)
            ),
            url(bg.PNG);
        }
        to {
          background-image: linear-gradient(
              rgba(0, 0, 255, 0.805),
              rgba(235, 10, 10, 0.784)
            ),
            url(bg.PNG);
        }
      }
      .box4 {
        background-color: red;
        animation: bg 1s linear infinite alternate;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2">
      <h1>Background Overlay Text</h1>
    </div>
    <div class="box3">
      <h1>Background Overlay Text</h1>
    </div>
    <div class="box4">
      <h1>Background Overlay Text</h1>
    </div>
  </body>
</html>
