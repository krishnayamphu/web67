<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css 3</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }
      h1 {
        font-weight: bold;
      }
      .shadow1 {
        text-shadow: 1px 1px 2px #222;
      }
      .shadow2 {
        text-shadow: 1px 1px 2px #d70000;
      }
      .shadow3 {
        text-shadow: 0px 0px 2px #d70000;
        color: white;
      }
      .shadow3 {
        text-shadow: 2px 0px 2px #d70000, 0px 2px 2px blue;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>Hello World</h1>
    <h1 class="shadow1">Hello World</h1>
    <h1 class="shadow2">Hello World</h1>
    <h1 class="shadow3">Hello World</h1>
  </body>
</html>
