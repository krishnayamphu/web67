<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css3</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: blue;
        float: left;
        margin: 15px;
        transition: all 1s;
      }

      section {
        width: 600px;
        height: 200px;
        border: 5px solid red;
        margin: 15px;
        overflow: hidden;
        perspective: 500px;
      }
      .box1:hover {
        transform: translateX(50px);
      }
      .box2:hover {
        transform: translateY(50px);
      }
      .box3:hover {
        transform: translateZ(-50px);
      }
      .box4:hover {
        transform: translate3d(50px, 50px, -50px);
      }
    </style>
  </head>
  <body>
    <section>
      <div class="box1">translateX</div>
      <div class="box2">translateY</div>
      <div class="box3">translateZ</div>
      <div class="box4">translate3d</div>
    </section>
  </body>
</html>
