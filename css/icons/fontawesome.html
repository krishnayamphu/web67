<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .text-danger {
        color: red;
      }
      .text-success {
        color: green;
      }
      .big-icon {
        font-size: 60px;
      }
    </style>
  </head>
  <body>
    <i class="fa-solid fa-house"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-image"></i>
    <i class="fa-solid fa-user"></i>

    <h3>Styling Basics</h3>
    <i class="fa-solid fa-house text-danger"></i>
    <i class="fa-solid fa-house text-success"></i>

    <h3>Sizing Icons</h3>
    <i class="fa-solid fa-coffee fa-2xs"></i>
    <i class="fa-solid fa-coffee fa-xs"></i>
    <i class="fa-solid fa-coffee fa-sm"></i>
    <i class="fa-solid fa-coffee"></i>
    <i class="fa-solid fa-coffee fa-lg"></i>
    <i class="fa-solid fa-coffee fa-xl"></i>
    <i class="fa-solid fa-coffee fa-2xl"></i>
    <p>
      <i class="fa-solid fa-coffee big-icon"></i>
    </p>

    <h3>Fixed width</h3>
    <!-- vertically aligning icons -->
    <div style="font-size: 2rem">
      <div>
        <i class="fa-solid fa-skating fa-fw" style="background: DodgerBlue"></i>
        Skating
      </div>
      <div>
        <i class="fa-solid fa-skiing fa-fw" style="background: SkyBlue"></i>
        Skiing
      </div>
      <div>
        <i
          class="fa-solid fa-skiing-nordic fa-fw"
          style="background: DodgerBlue"
        ></i>
        Nordic Skiing
      </div>
      <div>
        <i
          class="fa-solid fa-snowboarding fa-fw"
          style="background: SkyBlue"
        ></i>
        Snowboarding
      </div>
      <div>
        <i
          class="fa-solid fa-snowplow fa-fw"
          style="background: DodgerBlue"
        ></i>
        Snowplow
      </div>
    </div>

    <h3>Icons in a list</h3>
    <ul class="fa-ul">
      <li>
        <span class="fa-li"><i class="fa-solid fa-check-square"></i></span>List
        icons can
      </li>
      <li>
        <span class="fa-li"><i class="fa-solid fa-check-square"></i></span>be
        used to
      </li>
      <li>
        <span class="fa-li"><i class="fa-solid fa-spinner fa-pulse"></i></span
        >replace bullets
      </li>
      <li>
        <span class="fa-li"><i class="fa-regular fa-square"></i></span>in lists
      </li>
    </ul>

    <h3>Rotate Icons</h3>
    <div class="fa-3x">
      <i class="fa-solid fa-snowboarding"></i>
      <i class="fa-solid fa-snowboarding fa-rotate-90"></i>
      <i class="fa-solid fa-snowboarding fa-rotate-180"></i>
      <i class="fa-solid fa-snowboarding fa-rotate-270"></i>
      <i class="fa-solid fa-snowboarding fa-flip-horizontal"></i>
      <i class="fa-solid fa-snowboarding fa-flip-vertical"></i>
      <i class="fa-solid fa-snowboarding fa-flip-both"></i>
    </div>

    <h3>Animation</h3>
    <div class="fa-3x">
      <i class="fa-solid fa-circle-plus fa-beat"></i>
      <i class="fa-solid fa-heart fa-beat"></i>
      <i
        class="fa-solid fa-heart fa-beat"
        style="--fa-animation-duration: 0.5s"
      ></i>
      <i
        class="fa-solid fa-heart fa-beat"
        style="--fa-animation-duration: 2s"
      ></i>
      <i class="fa-solid fa-heart fa-beat" style="--fa-beat-scale: 2"></i>
    </div>

    <div class="fa-3x">
      <i class="fa-solid fa-triangle-exclamation fa-fade"></i>
      <i class="fa-solid fa-skull-crossbones fa-fade"></i>
      <i class="fa-solid fa-desktop-arrow-down fa-fade"></i>
      <i
        class="fa-solid fa-i-cursor fa-fade"
        style="--fa-animation-duration: 2s; --fa-fade-opacity: 0.6"
      ></i>
    </div>
    <div class="fa-3x">
      <i class="fa-solid fa-compact-disc fa-flip"></i>
      <i class="fa-solid fa-camera-rotate fa-flip"></i>
      <i class="fa-solid fa-cassette-tape fa-flip"></i>
      <i
        class="fa-solid fa-scroll fa-flip"
        style="--fa-flip-x: 1; --fa-flip-y: 0"
      ></i>
      <i
        class="fa-solid fa-money-check-dollar fa-flip"
        style="--fa-animation-duration: 3s"
      ></i>
    </div>
    <div class="fa-3x">
      <i class="fa-solid fa-bell fa-shake"></i>
      <i class="fa-solid fa-lock fa-shake"></i>
      <i class="fa-solid fa-stopwatch fa-shake"></i>
      <i class="fa-solid fa-bomb fa-shake"></i>
    </div>

    <div class="fa-3x">
      <i class="fa-solid fa-sync fa-spin"></i>
      <i class="fa-solid fa-circle-notch fa-spin"></i>
      <i class="fa-solid fa-cog fa-spin"></i>
      <i class="fa-solid fa-cog fa-spin fa-spin-reverse"></i>
      <i class="fa-solid fa-spinner fa-spin-pulse"></i>
      <i class="fa-solid fa-spinner fa-spin-pulse fa-spin-reverse"></i>
    </div>

    <hr />
    <button><i class="fa-solid fa-user-plus"></i> Add User</button>
    <button>
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <button><i class="fa-solid fa-envelope"></i> Send</button>

    <p><i class="fa-solid fa-building"></i> Kumaripati, Lalitpur</p>
    <p><i class="fa-solid fa-phone fa-shake"></i> 01-1345678</p>
  </body>
</html>
