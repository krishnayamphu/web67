<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: red;
      }
      div:hover {
        background-color: blue;
      }

      .box {
        width: 300px;
        height: auto;
        font-family: Arial, Helvetica, sans-serif;
        border: black solid 5px;
        margin: 15px;
        background-color: white;
        padding: 15px;
      }
      .box:hover {
        background-color: black;
        color: white;
      }
    </style>
  </head>
  <body>
    <div></div>
    <div class="box">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Delectus tempore
      ipsum esse distinctio dolores molestiae neque. Animi enim tenetur,
      architecto dicta temporibus corrupti quisquam eligendi! Modi impedit eum
      cum porro.
    </div>
  </body>
</html>
