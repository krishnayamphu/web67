<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Login</title>
  <style type="text/css">
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    form{
      width: 400px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin: 30px auto;
      padding: 15px;
      background-color: rgb(39, 136, 246, 0.1);
    }
    input{
      display: block;
      width: 100%;
      margin-bottom: 15px;
      padding: 5px 10px;
      border: 1px solid #ccc;
       border-radius: 2px;
    }
    input:focus{
      outline: 1px solid #2788f6;
      border: 1px solid transparent;
      border-radius: 2px;
    }
    button{
      padding: 2px 15px;
      background-color: #2788f6;
      border:none;
      color:white;
      border-radius: 2px;
    }
    button:hover{
      background-color: #166fd4;
    }
  </style>
</head>
<body>
<form>
  <input type="text" name="" placeholder="Username" autofocus>
  <input type="password" name="" placeholder="Password">
  <button>Login</button>
</form>
</body>
</html>
