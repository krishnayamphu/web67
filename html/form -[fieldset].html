<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form</title>
</head>
<body>
<form>
  <fieldset>
  <label>Name</label>
  <input type="text" name="" autofocus>
  <br><br> 
  <label>Fav Browser</label>
  <input list="browsers" name="browser">
  <datalist id="browsers">
    <option value="Internet Explorer">
    <option value="Firefox">
    <option value="Chrome">
    <option value="Opera">
    <option value="Safari">
  </datalist>
  <br><br>
  <fieldset>
    <legend>Temporary Address</legend>
    <label>Address</label>
    <input type="text" name="">
  </fieldset>
  <br><br>
  <fieldset>
  <legend>Permanent Address</legend>
  <label>Address</label>
  <input type="text" name="">
  </fieldset>
  <br><br>
  <button>Submit</button>
  </fieldset>
</form>
</body>
</html>
