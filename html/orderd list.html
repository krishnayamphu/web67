<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html</title>
</head>
<body>
    <ol>
        <li>Apple</li>
        <li>Orange</li>
        <li>Mango</li>
    </ol> 
    <hr>
    <ol type="A">
        <li>Apple</li>
        <li>Orange</li>
        <li>Mango</li>
    </ol>
    <hr>
    <ol type="a">
        <li>Apple</li>
        <li>Orange</li>
        <li>Mango</li>
    </ol>
    <hr>
    <ol type="I">
        <li>Apple</li>
        <li>Orange</li>
        <li>Mango</li>
    </ol>
    <hr>
    <ol type="i">
        <li>Apple</li>
        <li>Orange</li>
        <li>Mango</li>
    </ol>
    <hr>

    <ol start="5">
        <li>Apple</li>
        <li>Orange</li>
        <li>Mango</li>
    </ol>

</body>
</html>
