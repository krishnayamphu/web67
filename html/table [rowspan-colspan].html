<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>html</title>
    <style type="text/css">
        table{
           border-collapse: collapse;
            width: 200px;
        }
        th,td{
            border: 1px solid green;
            padding: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
<table>
   <tr>
       <th colspan="2">Amount</th>
   </tr>
   <tr>
       <td>Rs</td>
       <td>Paisa</td>
   </tr>
</table>
<hr>

<table>
   <tr>
       <th rowspan="2">Country</th>
       <td>Nepal</td>
   </tr>
   <tr>
       <td>China</td>
   </tr>
</table>
</body>
</html>
