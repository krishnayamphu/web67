<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>html</title>
    <style type="text/css">
        table{
           border-collapse: collapse;
            width: 200px;
        }
        th,td{
            border: 1px solid green;
            padding: 5px;
            text-align: center;
        }
        thead{
            background-color: purple;
            color:white;
        }
        tbody{
            background-color: #ccc;
        }
        tfoot{
            background-color: #222;
            color:white;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Pen</td>
                <td>50</td>
            </tr>
            <tr>
                <td>Copy</td>
                <td>30</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Total</th>
                <th>80</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
