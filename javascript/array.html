<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <script>
      const num = [10, 20, 30];
      document.write(num[2]);
      document.write("<hr>");
      for (let i = 0; i < 3; i++) {
        document.write(num[i] + "<br>");
      }

      const name = new Array("Ram", "Hari", "Mohan");
      document.write("<hr>");
      for (let i = 0; i < 3; i++) {
        document.write(name[i] + "<br>");
      }
    </script>
  </body>
</html>
