<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>javascript</title>
</head>
<body>
   <script>
    let x=parseFloat(prompt("enter value of x:",""));
    let y=parseFloat(prompt("enter value of y:",""));
    let op=prompt("choose operation(+,-):","");
    switch(op){
    case "+":
        document.write("Result: "+(x+y));
        break;
    case "-":
        document.write("Result: "+(x-y));
        break;
    default:
        document.write("Invalid operation");
        break;
    }
   </script>
</body>
</html>
