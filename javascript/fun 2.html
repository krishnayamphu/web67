<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <input oninput="textData()" type="text" id="demo" />
    <p>Text length: <span id="txtlength"></span></p>
    <script>
      function textData() {
        let data = document.getElementById("demo").value;
        document.getElementById("txtlength").innerHTML = data.length;
      }
    </script>
  </body>
</html>
