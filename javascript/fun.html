<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <button onclick="hi()">Say, Hi</button>
    <script>
      function hello() {
        document.write("Hello World");
      }
      hello();

      function hi() {
        alert("Hi");
      }
    </script>
  </body>
</html>
