<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>javascript</title>
</head>
<body>
    <script type="text/javascript">
       let marks=7;
       if(marks>=90)
        { document.write("Excellent"); }
        else if(marks>=75)
            { document.write("V. Good"); }
        else if(marks>=60)
            { document.write("Good"); }
        else if(marks>=45)
            { document.write("Satisfactory"); }
        else
            { document.write("Poor"); }
        
       
    </script>
</body>
</html>
