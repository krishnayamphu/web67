<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <script>
      let temp = 40;
      if (temp >= 35) {
        document.write("High Temperature");
      }

      document.write("<br>");

      let marks = 80;
      if (marks >= 35) {
        document.write("Pass");
      } else {
        document.write("Fail");
      }
      document.write("<br>");

      let x = 5,
        y = 6,
        z = 7;
      if (x > y && x > z) {
        document.write("x is greatest");
      } else if (y > x && y > z) {
        document.write("y is greatest");
      } else {
        document.write("z is greatest");
      }

      document.write("<br>");

      let day = 6;
      switch (day) {
        case 1:
          alert("sun");
          break;
        case 2:
          alert("mon");
          break;
        case 3:
          alert("tue");
          break;
        case 4:
          alert("wed");
          break;
        case 5:
          alert("thu");
          break;
        case 6:
          alert("fri");
          break;
        case 7:
          alert("sat");
          break;
        default:
          alert("invalid day no");
          break;
      }
    </script>
  </body>
</html>
