<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>javascript</title>
</head>
<body>
    <script type="text/javascript">
        let x=5; 
        let y=10;
        let z=5;
        document.write(x>y);
        document.write("<br>"+(x<y));
        document.write("<br>"+(x!=y));
        document.write("<br>"+(y>=z));
        document.write("<br>"+(x==z));
    </script>

</body>
</html>
