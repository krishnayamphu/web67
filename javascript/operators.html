<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <script>
      let a = 5;
      a++;
      document.write(a + "<br>");
      document.write(20 % 5);

      let b = 20;
      b += 5;
      document.write("<br>" + b);

      let x = 5;
      let y = 10;
      let z = 5;
      let c = "5";
      document.write("<br>" + (x > y));
      document.write("<br>" + (y >= z));
      document.write("<br>" + (x == z));
      document.write("<br>" + (x === c)); //same data type
      document.write("<br>" + (x == c));

      document.write("<br>" + (x > y && x > z));
      document.write("<br>" + (x > y ? "x is greater" : "y is greater"));
    </script>
  </body>
</html>
