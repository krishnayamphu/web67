<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>javascript</title>
</head>
<body>
    <script type="text/javascript">
        let x=5; 
        let y=10;
        x++;
        y--;

        document.write(x);
        document.write("<br>"+y);

        document.write("<br>"+(21%5));
    </script>

</body>
